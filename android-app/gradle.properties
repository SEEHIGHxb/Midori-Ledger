# Project-wide Gradle settings.

# Give the Gradle daemon a reasonable heap for the Android build.
org.gradle.jvmargs=-Xmx2048m

# AndroidX is required: every dependency here (appcompat, material, browser)
# ships as AndroidX, and AGP refuses to package them unless this is set.
# Android Studio writes this file automatically on project creation; this
# project was assembled by hand, so it was missing and the build failed at
# checkDebugAarMetadata until this was added.
android.useAndroidX=true
